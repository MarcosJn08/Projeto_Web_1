<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elixir Store</title>
    <link
      rel="stylesheet"
      href="assets/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="assets/bootstrap-icons/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <header class="container-fluid" id="base">
      <div class="row align-items-center justify-content-between">
        <div class="col-auto">
          <button
            class="btn d-flex align-items-center justify-content-start gap-2"
          >
            <img src="assets/images/Logo.png" alt="Logo" width="80" />
            <h1 class="m-0 fs-3">Elixir Store</h1>
            <i class="bi bi-chevron-down fs-5"></i>
          </button>
        </div>
        <div class="col-5 justify-content-center">
          <div class="input-group">
            <input
              type="text"
              class="form-control"
              placeholder="Procurar"
            />
            <span class="input-group-append">
              <button class="btn btn-outline-secondary" type="button">
                <i class="bi bi-search fs-5"></i>
              </button>
            </span>
          </div>
        </div>
        <div class="col-auto">
        <i class="bi bi-cart fs-1 text-light"></i>
        <i class="bi bi-bell-fill fs-1 text-light"></i>
        <i class="bi bi-person-circle fs-1 text-light"></i>

      </div>
      </div>
    </header>
  </body>
</html>

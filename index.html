<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elixir Store</title>
  <script src="assets/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="assets/node_modules/bootstrap/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/bootstrap-icons/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <header class="container-fluid" id="base">
    <div class="row align-items-center justify-content-between">
      <div class="col-auto dropdown">
        <button class="btn d-flex align-items-center justify-content-start dropdown-toggle text-light fs-1"
          type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-expanded="false">
          <img src="assets/images/Logo.png" alt="Logo" width="80" />
          <h1 class="m-0 fs-3">Elixir Store</h1>
        </button>
        <ul class="dropdown-menu align-items-center">
          <li>
            <a href="" class="dropdown-item text-light"><i class="bi bi-house-fill fs-4 ">Inicio</i></a>
          </li>
          <li>
            <a href="" class="dropdown-item text-light"><i class="bi bi-bookmarks fs-4">Catalogo</i></a>
          </li>
          <li>
            <a href="" class="dropdown-item text-light"><i class="bi bi-telephone-fill fs-4">Contato</i></a>
          </li>
        </ul>
      </div>
      <div class="col-5 justify-content-center">
        <div class="input-group" id="SearchBack">
          <input type="text" class="form-control" placeholder="Procurar" id="BarraDeBuscar" />
          <div class="input-group-append">
            <button class="btn btn-outline-secondary" type="button">
              <i class="bi bi-search fs-5"></i>
            </button>
          </div>
        </div>
      </div>
      <div class="col-auto">
        <i class="bi bi-cart fs-1 text-light"></i>
        <i class="bi bi-bell-fill fs-1 text-light"></i>
        <i class="bi bi-person-circle fs-1 text-light"></i>
      </div>
    </div>
  </header>
  <main></main>
  <footer class="row align-items-end justify-content-center">
    Site de Jogos - WEB 1
  </footer>
</body>

</html>
